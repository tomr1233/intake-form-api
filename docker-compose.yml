version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: expresnext-intake-postgres
    environment:
      POSTGRES_USER: expresnext
      POSTGRES_PASSWORD: expresnext
      POSTGRES_DB: expresnext_intake
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expresnext -d expresnext_intake"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: expresnext-intake-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
